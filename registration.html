<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | Emax.dev</title>
  <link rel="stylesheet" href="style.css"/>

   <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
  <!-- REGISTRATION MODAL OVERLAY -->
  <div class="auth-overlay" id="registrationOverlay">
    <div class="auth-modal" id="registrationModal">
      <div class="auth-modal-glow"></div>
      <div class="auth-logo">⚡ Emax.dev</div>
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Join to access the full portfolio experience</p>

      <form id="registrationForm" class="auth-form">
        <div class="input-group">
          <span class="input-icon"><i class="fas fa-user"></i></span>
          <input type="text" id="regName" placeholder="Full Name" required autocomplete="off"/>
        </div>
        <div class="input-group">
          <span class="input-icon"><i class="fas fa-envelope"></i></span>
          <input type="email" id="regEmail" placeholder="Email Address" required autocomplete="off"/>
        </div>
        <div class="input-group">
          <span class="input-icon"><i class="fas fa-lock"></i></span>
          <input type="password" id="regPassword" placeholder="Password" required/>
          <span class="toggle-pw" onclick="togglePassword('regConfirm', this)"><i class="fas fa-eye"></i></span>
        </div>
        <div class="input-group">
          <span class="input-icon"><i class="fas fa-lock"></i></span>
          <input type="password" id="regConfirm" placeholder="Confirm Password" required/>
          <span class="toggle-pw" onclick="togglePassword('regConfirm', this)"><i class="fas fa-eye"></i></span>
        </div>
        <div id="regError" class="auth-error"></div>
        <button type="submit" class="auth-btn">Register Now</button>
      </form>

      <p class="auth-switch">Already have an account?
        <a href="login.html" class="auth-link">Login here</a>
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
